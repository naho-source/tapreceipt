<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TapReceipt</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main class="receipt-container">
      <h1>TapReceipt</h1>

      <section class="receipt-card">
        <h2>Digital Receipt</h2>

        <p><strong>Merchant:</strong> Nahom Market</p>
        <p><strong>Receipt Number:</strong> TR-0001</p>
        <p><strong>Date:</strong> June 20, 2026</p>

        <table>
          <thead>
            <tr>
              <th>Item</th>
              <th>Quantity</th>
              <th>Unit Price</th>
              <th>Amount</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>Coffee</td>
              <td>2</td>
              <td>$4.50</td>
              <td>$9.00</td>
            </tr>

            <tr>
              <td>Bagel</td>
              <td>1</td>
              <td>$3.00</td>
              <td>$3.00</td>
            </tr>
          </tbody>
        </table>

        <hr />

        <p><strong>Subtotal:</strong> $12.00</p>
        <p><strong>Tax:</strong> $0.72</p>
        <p class="total"><strong>Total:</strong> $12.72</p>

        <p><strong>Payment Method:</strong> Visa ending in 4242</p>

        <p>Thank you for your purchase.</p>
      </section>
    </main>
  </body>
</html>
